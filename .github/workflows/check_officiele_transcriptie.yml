name: Check Officiële Transcriptie

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      gemeente:
        description: "Gemeente ID (leeg = alle gemeenten)"
        required: false
        default: ""

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependencies installeren
        run: pip install pdfminer.six requests

      - name: Check uitvoeren (specifieke gemeente)
        if: ${{ github.event.inputs.gemeente != '' }}
        env:
          GEMEENTE_ID: ${{ github.event.inputs.gemeente }}
        run: python check_officiele_transcriptie.py

      - name: Check uitvoeren (alle gemeenten)
        if: ${{ github.event.inputs.gemeente == '' }}
        run: |
          python3 list_gemeenten.py | while read gemeente_id; do
            echo "=== Check: $gemeente_id ==="
            GEMEENTE_ID="$gemeente_id" python check_officiele_transcriptie.py
          done

      - name: Wijzigingen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ || true
          git diff --staged --quiet || git commit -m "Officiële transcriptie(s) bijgewerkt [skip ci]"
          git pull --rebase && git push
