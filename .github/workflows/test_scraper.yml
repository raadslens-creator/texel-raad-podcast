name: Test Scraper

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependencies installeren
        run: |
          pip install pdfminer.six requests

      - name: Test scraper draaien
        run: python test_scraper.py

      - name: Resultaten committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/vocabulary_cache.json || true
          git diff --staged --quiet || git commit -m "Vocabulary cache bijgewerkt [skip ci]"
          git push
