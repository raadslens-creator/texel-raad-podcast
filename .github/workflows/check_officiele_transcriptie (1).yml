name: Check Officiele Transcriptie

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      gemeente:
        description: "Gemeente ID (leeg = alle gemeenten)"
        required: false
        default: ""

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependencies installeren
        run: pip install pdfminer.six requests

      - name: Check uitvoeren
        env:
          GEMEENTE_ID: ${{ github.event.inputs.gemeente }}
        run: python run_check_alle_gemeenten.py

      - name: Wijzigingen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ || true
          git diff --staged --quiet || git commit -m "Officiele transcriptie(s) bijgewerkt [skip ci]"
          git pull --rebase && git push
