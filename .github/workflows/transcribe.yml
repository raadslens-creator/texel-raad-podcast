name: Transcribeer Vergadering

on:
  workflow_dispatch:
    inputs:
      gemeente:
        description: "Gemeente ID (bijv. texel of hollandskroon)"
        required: false
        default: "texel"
      date_id:
        description: "Specifieke vergadering (bijv. 20260218_1), leeg = laatste"
        required: false
        default: ""
      date_ids:
        description: "Meerdere vergaderingen komma-gescheiden (voor backfill)"
        required: false
        default: ""

jobs:
  transcribe:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependencies installeren
        run: |
          pip install faster-whisper
          sudo apt-get install -y ffmpeg

      - name: Transcriberen (enkelvoudig)
        if: ${{ github.event.inputs.date_ids == '' }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DATE_ID: ${{ github.event.inputs.date_id }}
          GEMEENTE_ID: ${{ github.event.inputs.gemeente }}
        run: python transcribe_vergadering.py

      - name: Transcriberen (meerdere - backfill)
        if: ${{ github.event.inputs.date_ids != '' }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GEMEENTE_ID: ${{ github.event.inputs.gemeente }}
        run: |
          IFS=',' read -ra IDS <<< "${{ github.event.inputs.date_ids }}"
          for id in "${IDS[@]}"; do
            id=$(echo "$id" | xargs)
            echo "=== Transcriberen: $id ==="
            DATE_ID="$id" python transcribe_vergadering.py
          done

      - name: Wijzigingen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ || true
          git diff --staged --quiet || git commit -m "Transcriptie(s) toegevoegd [skip ci]"
          git pull --rebase && git push
